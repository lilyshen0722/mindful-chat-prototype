<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mindful Chat — Research Prototype</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="chat-body">
  <header class="banner banner--warning" role="alert">
    <strong>Research prototype.</strong> Not a crisis service. If you are in
    crisis, call or text <strong>988</strong> (US) or visit
    <a href="https://www.iasp.info/resources/Crisis_Centres/" target="_blank" rel="noopener">iasp.info</a>.
  </header>

  <main class="chat">
    <div class="chat-header">
      <h1>Mindful Chat</h1>
      <button id="new-chat" type="button" class="btn-secondary" title="Start a fresh conversation. Past messages stay in the admin log but won't appear here.">New conversation</button>
    </div>
    <p class="muted small">
      An academic prototype that demonstrates a crisis-language guardrail
      around a chatbot. Conversations are logged locally for research review.
    </p>

    <div id="messages" class="messages" aria-live="polite"></div>

    <form id="chat-form" class="composer">
      <textarea id="msg-input" name="message" placeholder="Type a message…" rows="2" required></textarea>
      <button type="submit" id="send">Send</button>
    </form>

    <p class="muted small">
      <a href="/admin">Admin dashboard</a>
    </p>
  </main>

  <script>
    // ---- conversation id -------------------------------------------------
    function makeId() {
      if (typeof crypto !== "undefined" && typeof crypto.randomUUID === "function") {
        return crypto.randomUUID();
      }
      // Fallback for older browsers.
      return "cid-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 10);
    }
    const conversationId = (() => {
      const k = "mindful-chat-cid";
      try {
        let v = localStorage.getItem(k);
        if (!v) {
          v = makeId();
          localStorage.setItem(k, v);
        }
        return v;
      } catch {
        return makeId();
      }
    })();

    // ---- DOM refs --------------------------------------------------------
    const messagesEl = document.getElementById("messages");
    const formEl = document.getElementById("chat-form");
    const inputEl = document.getElementById("msg-input");
    const sendBtn = document.getElementById("send");
    const newChatBtn = document.getElementById("new-chat");

    // ---- helpers ---------------------------------------------------------
    function escapeHtml(s) {
      return String(s ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function renderText(s) {
      let html = escapeHtml(s);
      html = html.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
      html = html.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
      html = html.replace(/\n/g, "<br />");
      return html;
    }

    function appendMessage(role, text) {
      const wrap = document.createElement("div");
      wrap.className = `msg msg--${role}`;
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.innerHTML = renderText(text);
      wrap.appendChild(bubble);
      messagesEl.appendChild(wrap);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return { wrap, bubble };
    }

    function appendStreamingBubble() {
      const wrap = document.createElement("div");
      wrap.className = "msg msg--assistant streaming";
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.innerHTML = '<span class="typing"><span></span><span></span><span></span></span>';
      wrap.appendChild(bubble);
      const meta = document.createElement("div");
      meta.className = "meta";
      wrap.appendChild(meta);
      messagesEl.appendChild(wrap);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return { wrap, bubble, meta };
    }

    // Parse one SSE event block ("data: ...\n[event: ...\n]")
    function parseSseBlock(block) {
      const out = { event: "message", data: null };
      for (const rawLine of block.split("\n")) {
        const line = rawLine.replace(/\r$/, "");
        if (line.startsWith("event: ")) out.event = line.slice(7).trim();
        else if (line.startsWith("data: ")) out.data = line.slice(6);
      }
      return out;
    }

    // ---- send loop -------------------------------------------------------
    async function sendMessage(text) {
      appendMessage("user", text);
      const { wrap, bubble, meta } = appendStreamingBubble();
      let accumulated = "";
      let firstToken = true;

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ conversation_id: conversationId, message: text }),
        });
        if (!res.ok || !res.body) {
          bubble.textContent = `Request failed: ${res.status}`;
          return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        const handleEvent = (block) => {
          if (!block.trim()) return;
          const { data } = parseSseBlock(block);
          if (!data) return;
          let payload;
          try { payload = JSON.parse(data); } catch { return; }

          if (payload.type === "token") {
            if (firstToken) {
              bubble.innerHTML = "";
              wrap.classList.remove("streaming");
              firstToken = false;
            }
            accumulated += payload.value;
            bubble.innerHTML = renderText(accumulated);
            messagesEl.scrollTop = messagesEl.scrollHeight;
          } else if (payload.type === "replace") {
            accumulated = payload.value;
            bubble.innerHTML = renderText(accumulated);
            wrap.classList.remove("streaming");
            firstToken = false;
          } else if (payload.type === "done") {
            if (payload.escalated) {
              meta.textContent = `risk: ${payload.risk_level} · logged for review`;
            }
            if (firstToken) {
              bubble.textContent = "[no response]";
            }
          }
        };

        while (true) {
          const { value, done } = await reader.read();
          if (value) buffer += decoder.decode(value, { stream: !done });

          // SSE events are separated by a blank line.
          let idx;
          while ((idx = buffer.indexOf("\n\n")) !== -1) {
            const block = buffer.slice(0, idx);
            buffer = buffer.slice(idx + 2);
            handleEvent(block);
          }

          if (done) {
            // Flush any trailing event that didn't have its blank line.
            if (buffer.trim()) handleEvent(buffer);
            buffer = "";
            break;
          }
        }
      } catch (err) {
        bubble.textContent = `[Error] ${err}`;
      }
    }

    formEl.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = inputEl.value.trim();
      if (!text) return;
      inputEl.value = "";
      sendBtn.disabled = true;
      sendBtn.textContent = "…";
      try {
        await sendMessage(text);
      } finally {
        sendBtn.disabled = false;
        sendBtn.textContent = "Send";
        inputEl.focus();
      }
    });

    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        formEl.requestSubmit();
      }
    });

    newChatBtn.addEventListener("click", () => {
      const ok = confirm(
        "Start a new conversation?\n\n" +
        "Past messages will remain in the admin review log, but won't appear in this chat anymore."
      );
      if (!ok) return;
      try { localStorage.setItem("mindful-chat-cid", makeId()); } catch {}
      location.reload();
    });

    // Visible JS error reporting so future regressions don't disappear silently.
    window.addEventListener("error", (e) => {
      const msg = `[JS error] ${e.message} (${e.filename}:${e.lineno})`;
      appendMessage("system", msg);
    });

    // ---- on load: hydrate past messages for this conversation -----------
    (async function hydrateHistory() {
      try {
        const res = await fetch(`/api/conversation/${encodeURIComponent(conversationId)}/messages`);
        if (!res.ok) return;
        const items = await res.json();
        for (const m of items) {
          const role = m.role === "user" ? "user" : "assistant";
          appendMessage(role, m.content);
        }
      } catch {
        // silent — fresh chat is fine
      }
    })();
  </script>
</body>
</html>
